- name: mysql 
  hosts: mysql
  become: yes
  vars:
    mysql_root_password: "ExpenseApp@1"
  tasks:
    # - name: Update system packages
    #   ansible.builtin.dnf:
    #     name: "*"
    #     state: latest

    # - name: Install MySQL Community Repository (EL9 for AL2023)
    #   ansible.builtin.dnf:
    #     # Use the full direct URL to avoid the local file permission error
    #     name: "https://dev.mysql.com"
    #     state: present
    #     disable_gpg_check: yes

    - name: Install MySQL server
      ansible.builtin.package:
        name: mysql-server
        state: present
    
    - name: Start and enable mysqld service
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes

    - name: Set mysql password
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        host: localhost
        state: present
      no_log: true


